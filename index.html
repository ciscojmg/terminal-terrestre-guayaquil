<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Terminal Terrestre Guayaquil - Cooperativas, Horarios y Rutas</title>
  <meta name="description" content="Encuentra cooperativas, horarios, boleterías y rutas del Terminal Terrestre de Guayaquil. Información práctica para viajeros.">
  <meta name="keywords" content="terminal terrestre Guayaquil, cooperativas Guayaquil, horarios buses, boleterías terminal, rutas Guayaquil">
  <link rel="canonical" href="https://terminal-terrestre-guayaquil.example.com/">
  <meta property="og:title" content="Terminal Terrestre Guayaquil - Cooperativas, Horarios y Rutas">
  <meta property="og:description" content="Encuentra cooperativas, horarios y rutas del Terminal Terrestre de Guayaquil.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://terminal-terrestre-guayaquil.example.com/">
  <meta property="og:locale" content="es_EC">
  <meta name="twitter:card" content="summary">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: "#30bced",
              50: "#e8f8fd",
              100: "#b8ebf9",
              200: "#88def5",
              300: "#58d1f1",
              400: "#30bced",
              500: "#30bced",
              600: "#1a9fc9",
              700: "#1584a8",
              800: "#106987",
              900: "#0b4e66",
            },
            "background-light": "#f5f9fb",
            "background-dark": "#0d1a1f",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BusStation",
    "name": "Terminal Terrestre Guayaquil",
    "description": "Información de cooperativas, horarios y rutas del Terminal Terrestre de Guayaquil.",
    "address": { "@type": "PostalAddress", "addressLocality": "Guayaquil", "addressRegion": "Guayas", "addressCountry": "EC" },
    "url": "https://terminal-terrestre-guayaquil.example.com/"
  }
  </script>
  <style>
    body { min-height: max(884px, 100dvh); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
  <!-- Header -->
  <header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
    <div class="flex items-center p-4 justify-between">
      <div class="text-primary flex size-10 items-center justify-center">
        <span class="material-symbols-outlined text-3xl">location_on</span>
      </div>
      <h1 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center">Terminal Terrestre Guayaquil</h1>
      <div class="size-10 flex items-center justify-center"></div>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto pb-8">
    <!-- Search Bar -->
    <section class="p-4">
      <div class="relative group">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
          <span class="material-symbols-outlined">search</span>
        </div>
        <input id="search" class="w-full h-14 pl-12 pr-4 bg-white dark:bg-slate-900 border-none rounded-2xl shadow-sm focus:ring-2 focus:ring-primary/50 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 font-medium" placeholder="Buscar destino o cooperativa..." type="search" autocomplete="off"/>
      </div>
    </section>

    <!-- Destinos Populares -->
    <section class="px-4 py-4">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold tracking-tight">Destinos Populares</h2>
        <button type="button" id="ver-todos-destinos" class="text-primary text-sm font-semibold">Ver todos</button>
      </div>
      <div id="destinos-grid" class="flex gap-4 overflow-x-auto pt-3 pb-2 no-scrollbar">
        <!-- Llenado por JavaScript desde cooperativas -->
      </div>
    </section>

    <!-- Cooperativas Grid -->
    <section class="px-4 py-6">
      <h2 class="text-xl font-bold tracking-tight mb-4">Explorar Cooperativas</h2>
      <div id="cooperativas-grid" class="grid grid-cols-2 gap-4">
        <!-- Llenado por JavaScript -->
      </div>
      <p id="no-results" class="hidden text-center text-slate-500 dark:text-slate-400 py-8">No se encontraron cooperativas.</p>
      <a href="https://maps.app.goo.gl/4bS114fFECjtWm3L8" target="_blank" rel="noopener noreferrer" class="mt-6 flex items-center justify-center gap-2 w-full py-3 px-4 bg-primary/10 text-primary font-semibold rounded-xl hover:bg-primary/20 transition-colors border border-primary/30">
        <span class="material-symbols-outlined">map</span>
        Aquí es donde queda el lugar en Google Maps
      </a>
    </section>

    <!-- Contribuidores -->
    <section class="px-4 py-6 pb-12">
      <h2 class="text-xl font-bold tracking-tight mb-2">Contribuidores</h2>
      <p class="text-sm text-slate-600 dark:text-slate-400 mb-4">Personas que han contribuido a este proyecto. <a href="contribuir.html" class="text-primary font-medium hover:underline">¿Cómo contribuir?</a></p>
      <div id="contribuidores-grid" class="flex flex-wrap gap-3">
        <!-- Llenado por JavaScript -->
      </div>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
