name: Actualizar contribuidores

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Obtener contribuidores y actualizar CONTRIBUTORS.json
        run: |
          curl -s -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/ciscojmg/terminal-terrestre-guayaquil/contributors?per_page=100" | \
          jq '{
            contributors: [
              .[] | {
                login: .login,
                avatar_url: .avatar_url,
                html_url: .html_url
              }
            ]
          }' > CONTRIBUTORS.json

      - name: Verificar cambios
        id: changes
        run: |
          if git diff --quiet CONTRIBUTORS.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit y push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CONTRIBUTORS.json
          git commit -m "chore: actualizar lista de contribuidores"
          git push
